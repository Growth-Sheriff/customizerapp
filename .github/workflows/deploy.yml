name: Build & Deploy Upload Studio

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_DIR: /opt/apps/custom/customizerapp/upload-studio
  IMAGE_NAME: upload-studio:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Pull, Build & Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            echo "=== [1/4] Git Pull ==="
            cd ${{ env.APP_DIR }}/src
            git pull origin main

            echo "=== [2/4] Docker Build ==="
            /usr/bin/docker build -t ${{ env.IMAGE_NAME }} .

            echo "=== [3/4] Restart Containers ==="
            cd ${{ env.APP_DIR }}
            /usr/bin/docker compose down
            /usr/bin/docker compose up -d

            echo "=== [4/4] Health Check ==="
            sleep 60
            FAILED=0
            for name in everydaycustomprint dtftransferohio dtfprinthouse dtfprintdepot eagledtfprint alphaprint gangsheet legendtransfers customprintaz; do
              port=$(/usr/bin/docker port us-$name 3000/tcp 2>/dev/null | cut -d: -f2)
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:$port/health 2>/dev/null)
              if [ "$code" = "200" ]; then
                echo "✅ $name (:$port): $code"
              else
                echo "❌ $name (:$port): $code"
                FAILED=$((FAILED+1))
              fi
            done

            if [ $FAILED -gt 0 ]; then
              echo "⚠️ $FAILED tenant(s) failed health check"
              exit 1
            fi
            echo "🎉 All 9 tenants healthy!"

